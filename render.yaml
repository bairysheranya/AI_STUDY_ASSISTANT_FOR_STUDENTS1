services:
  - type: web
    name: ai-study-assistant
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
